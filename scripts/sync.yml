name: WC2026 sync

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 min (UTC). GitHub may delay scheduled runs.
  workflow_dispatch: {}       # lets you run it by hand from the Actions tab

permissions:
  contents: read

concurrency:
  group: wc2026-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/sync.mjs
        env:
          API_KEY: ${{ secrets.APIFOOTBALL_KEY }}
          DB_URL: ${{ secrets.RTDB_URL }}   # optional — omit the secret to use the baked-in URL
