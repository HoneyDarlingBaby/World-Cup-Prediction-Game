<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0E1320">
<title>WC 2026 · Us vs Us</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E1320; --bg2:#080B13; --surface:#161D2C; --surface2:#1C2433;
    --line:#28324633; --line-s:#2A3346; --line-2:#3a455d;
    --txt:#EAEEF6; --mut:#8C95AA; --mut2:#646E84;
    --p1:#F5B33F; --p1soft:rgba(245,179,63,.15); --p1line:rgba(245,179,63,.55);
    --p2:#36D2C0; --p2soft:rgba(54,210,192,.15); --p2line:rgba(54,210,192,.55);
    --good:#49C56C; --goodsoft:rgba(73,197,108,.16);
    --bad:#EC5B52;  --badsoft:rgba(236,91,82,.14);
    --r:14px;
    --disp:'Oswald',-apple-system,system-ui,sans-serif;
    --body:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--body); color:var(--txt);
    background:
      radial-gradient(1200px 600px at 50% -10%, #182238 0%, transparent 60%),
      linear-gradient(180deg,var(--bg) 0%, var(--bg2) 100%);
    background-attachment:fixed;
    min-height:100vh; line-height:1.45;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 14px calc(64px + env(safe-area-inset-bottom))}

  header{
    position:sticky;top:0;z-index:50;
    margin:0 -14px;padding:max(10px,env(safe-area-inset-top)) 14px 0;
    background:linear-gradient(180deg, rgba(12,16,25,.96) 0%, rgba(12,16,25,.82) 78%, rgba(12,16,25,0) 100%);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  }
  .brand{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px}
  .brand .dot{width:6px;height:6px;border-radius:50%;background:var(--p1);box-shadow:0 0 0 3px var(--p1soft)}
  .brand .dot.t{background:var(--p2);box-shadow:0 0 0 3px var(--p2soft)}
  .brand h1{
    font-family:var(--disp);font-weight:500;letter-spacing:.32em;text-transform:uppercase;
    font-size:11px;color:var(--mut);margin:0;padding-left:.32em;
  }

  .board{
    position:relative;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
    background:linear-gradient(160deg,var(--surface) 0%, #12182680 100%);
    border:1px solid var(--line-s);border-radius:18px;overflow:hidden;
    padding:14px 8px 15px;
  }
  .board::before{
    content:"";position:absolute;inset:0;opacity:.5;pointer-events:none;
    background:repeating-linear-gradient(115deg, transparent 0 26px, rgba(255,255,255,.014) 26px 52px);
  }
  .side{position:relative;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:0;padding:0 4px}
  .namewrap{display:flex;align-items:center;gap:5px;max-width:100%}
  .pin{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
  .p1 .pin,.pin.p1{background:var(--p1)} .p2 .pin,.pin.p2{background:var(--p2)}
  input.name{
    font-family:var(--disp);font-weight:600;text-transform:uppercase;letter-spacing:.06em;
    font-size:13px;color:var(--txt);background:transparent;border:none;outline:none;
    text-align:center;width:100%;min-width:40px;padding:2px 2px;border-radius:6px;
    text-overflow:ellipsis;
  }
  input.name:focus{background:#ffffff10}
  .side.s1 input.name{color:var(--p1)} .side.s2 input.name{color:var(--p2)}
  .score{font-family:var(--disp);font-weight:600;font-variant-numeric:tabular-nums;
    font-size:54px;line-height:.92;letter-spacing:-.01em;margin-top:1px}
  .side.s1 .score{color:var(--p1);text-shadow:0 0 26px rgba(245,179,63,.28)}
  .side.s2 .score{color:var(--p2);text-shadow:0 0 26px rgba(54,210,192,.28)}
  .breakdown{font-size:10.5px;color:var(--mut2);font-variant-numeric:tabular-nums;letter-spacing:.02em}
  .vs{position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;padding:0 6px}
  .vs .v{font-family:var(--disp);font-weight:500;font-size:13px;color:var(--mut2);letter-spacing:.18em}
  .vs .lead{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.14em;
    padding:3px 7px;border-radius:20px;white-space:nowrap;min-height:18px;display:flex;align-items:center}
  .vs .lead.tie{color:var(--mut);background:#ffffff0d}
  .vs .lead.l1{color:var(--p1);background:var(--p1soft)}
  .vs .lead.l2{color:var(--p2);background:var(--p2soft)}

  .tabs{display:flex;gap:4px;background:#0c1018cc;border:1px solid var(--line-s);
    border-radius:12px;padding:4px;margin:10px 0 4px}
  .tabs button{flex:1;font-family:var(--disp);font-weight:500;letter-spacing:.08em;text-transform:uppercase;
    font-size:12px;color:var(--mut);background:transparent;border:none;border-radius:8px;
    padding:9px 4px;cursor:pointer;transition:.18s}
  .tabs button[aria-selected="true"]{background:var(--surface2);color:var(--txt);box-shadow:0 1px 0 #ffffff0a inset}

  .syncbar{font-size:11.5px;border-radius:10px;padding:9px 12px;line-height:1.5;
    display:flex;align-items:center;gap:8px}
  .syncbar.info{background:#141b2a;border:1px solid var(--line-s);color:var(--mut)}
  .syncbar.info b{color:var(--txt);font-weight:600}
  .syncbar.info .i{flex:0 0 auto}

  .hint{font-size:11.5px;color:var(--mut);margin:14px 2px 2px;display:flex;gap:6px;align-items:flex-start}
  .hint b{color:var(--txt);font-weight:600}
  .legend{display:flex;flex-wrap:wrap;gap:5px 14px;font-size:11px;color:var(--mut);margin:8px 2px 12px}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .key{font-family:var(--disp);font-weight:600;font-size:11px;color:var(--txt);
    background:#ffffff12;border-radius:5px;padding:1px 6px;letter-spacing:.04em}

  .chips{display:flex;gap:7px;overflow-x:auto;padding:4px 2px 12px;margin:0 -2px;
    scrollbar-width:none;-ms-overflow-style:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;font-family:var(--disp);font-weight:500;letter-spacing:.05em;
    font-size:13px;color:var(--mut);background:var(--surface);border:1px solid var(--line-s);
    border-radius:11px;padding:8px 13px;cursor:pointer;transition:.16s;white-space:nowrap}
  .chip small{display:block;font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut2);font-weight:400;margin-top:1px}
  .chip[aria-selected="true"]{color:#0c1018;background:var(--txt);border-color:var(--txt)}
  .chip[aria-selected="true"] small{color:#0c1018aa}

  .md{display:flex;align-items:center;gap:10px;margin:18px 2px 9px}
  .md .lab{font-family:var(--disp);font-weight:600;letter-spacing:.16em;text-transform:uppercase;
    font-size:10.5px;color:var(--mut)}
  .md .dt{font-size:10.5px;color:var(--mut2);letter-spacing:.04em}
  .md .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--line-2),transparent)}

  .card{background:var(--surface);border:1px solid var(--line-s);border-radius:var(--r);
    padding:12px 12px 11px;margin-bottom:11px;position:relative;transition:border-color .2s}
  .card.done{border-color:#33405a}
  .ctop{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;gap:6px}
  .team{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
  .team.away{flex-direction:row-reverse;text-align:right}
  .flag{flex:0 0 auto;display:inline-flex;align-items:center}
  .flagimg{width:29px;height:20px;object-fit:cover;border-radius:3px;display:block;
    background:#0e1422;box-shadow:0 1px 2px #0006,0 0 0 1px #ffffff14}
  .flagmini{display:inline-block;width:14px;height:10px;object-fit:cover;border-radius:2px;
    margin-right:3px;vertical-align:middle;box-shadow:0 0 0 1px #00000055}
  .noflag{width:auto!important;height:auto!important;box-shadow:none!important;background:none!important;
    font-size:18px;line-height:1;color:var(--mut2)}
  .tname{font-weight:600;font-size:14.5px;letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .team.win .tname{color:var(--txt)} .team.lose .tname{color:var(--mut2)}
  .cmid{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:2px;padding:0 4px}
  .status{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mut2)}
  .status.up{color:var(--mut)} .status.ft{color:var(--good)}
  .vbadge{font-family:var(--disp);font-weight:400;color:var(--mut2);font-size:13px;letter-spacing:.08em}

  .row{display:flex;align-items:center;gap:9px;margin-top:7px}
  .row .who{flex:0 0 52px;display:flex;align-items:center;gap:5px;font-family:var(--disp);
    font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);
    overflow:hidden;white-space:nowrap}
  .row.result .who{color:var(--mut2);font-size:9.5px;letter-spacing:.12em}
  .seg{display:flex;flex:1;gap:5px}
  .seg button{flex:1;min-height:40px;font-family:var(--disp);font-weight:600;font-size:15px;
    color:var(--mut);background:#0e1422;border:1.5px solid var(--line-s);border-radius:9px;
    cursor:pointer;transition:.13s;letter-spacing:.02em;padding:0 2px;overflow:hidden;
    text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;justify-content:center;gap:4px}
  .seg button:active{transform:scale(.97)}
  .row.result .seg button{min-height:34px;font-size:13px;border-style:dashed}
  .row.result .seg button.sel{background:var(--txt);color:#0c1018;border-color:var(--txt);border-style:solid}

  .row.p1 .seg button.sel{background:var(--p1soft);border-color:var(--p1line);color:var(--p1)}
  .row.p2 .seg button.sel{background:var(--p2soft);border-color:var(--p2line);color:var(--p2)}
  .row.p1 .seg button.sel.correct,.row.p2 .seg button.sel.correct{
    background:var(--goodsoft);border-color:var(--good);color:var(--good)}
  .row.p1 .seg button.sel.wrong,.row.p2 .seg button.sel.wrong{
    background:var(--badsoft);border-color:var(--bad);color:var(--bad)}
  .tick{font-size:12px;font-weight:700}

  .adder{background:linear-gradient(160deg,var(--surface) 0%,#12182600 120%);
    border:1px dashed var(--line-2);border-radius:var(--r);padding:13px;margin-bottom:16px}
  .adder .lab{font-family:var(--disp);font-weight:600;letter-spacing:.1em;text-transform:uppercase;
    font-size:11px;color:var(--mut);margin-bottom:9px}
  .rounds{display:flex;gap:6px;overflow-x:auto;padding-bottom:9px;margin-bottom:9px;scrollbar-width:none}
  .rounds::-webkit-scrollbar{display:none}
  .rbtn{flex:0 0 auto;font-family:var(--disp);font-weight:500;font-size:11.5px;letter-spacing:.05em;
    color:var(--mut);background:#0e1422;border:1px solid var(--line-s);border-radius:9px;
    padding:7px 11px;cursor:pointer;white-space:nowrap;transition:.14s}
  .rbtn[aria-selected="true"]{background:var(--txt);color:#0c1018;border-color:var(--txt)}
  .teamins{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .teamins input{flex:1;min-width:0;background:#0e1422;border:1.5px solid var(--line-s);border-radius:9px;
    color:var(--txt);font-size:14px;font-family:var(--body);padding:11px 11px;outline:none}
  .teamins input:focus{border-color:var(--line-2)}
  .teamins input::placeholder{color:var(--mut2)}
  .teamins .x{flex:0 0 auto;font-family:var(--disp);color:var(--mut2);font-size:12px;letter-spacing:.1em}
  .addbtn{width:100%;font-family:var(--disp);font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    font-size:13px;color:#0c1018;background:linear-gradient(180deg,#fff,#dfe5f0);border:none;
    border-radius:10px;padding:12px;cursor:pointer;transition:.15s}
  .addbtn:disabled{opacity:.4;cursor:default}
  .addbtn:not(:disabled):active{transform:scale(.99)}

  .empty{text-align:center;color:var(--mut);padding:34px 18px;border:1px dashed var(--line-s);
    border-radius:var(--r);font-size:13px;line-height:1.6}
  .empty .big{font-family:var(--disp);font-weight:500;letter-spacing:.04em;color:var(--txt);
    font-size:16px;display:block;margin-bottom:5px}
  .kohead{font-family:var(--disp);font-weight:600;letter-spacing:.14em;text-transform:uppercase;
    font-size:10.5px;color:var(--mut);margin:18px 2px 9px}
  .del{position:absolute;top:9px;right:9px;width:26px;height:26px;border-radius:7px;
    background:#ffffff0a;border:1px solid var(--line-s);color:var(--mut2);font-size:14px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;line-height:1;padding:0}
  .del:active{background:var(--badsoft);color:var(--bad)}

  .foot{margin:26px 2px 8px;display:flex;flex-direction:column;gap:8px}
  .foot .note{font-size:11px;color:var(--mut2);line-height:1.6;margin-top:6px}
  .tools{display:flex;gap:8px}
  .tools button{flex:1;font-size:11.5px;font-family:var(--body);color:var(--mut);
    background:transparent;border:1px solid var(--line-s);border-radius:9px;padding:10px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:6px}
  .tools button:active{background:#ffffff08}
  .tools.primary button{color:var(--txt);background:#ffffff0a;font-weight:500}

  .skeleton{padding:60px 0;text-align:center;color:var(--mut)}
  .skeleton .s{font-family:var(--disp);letter-spacing:.2em;text-transform:uppercase;font-size:12px;animation:pulse 1.3s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:.9}}

  /* backup / restore sheet */
  .modal{position:fixed;inset:0;z-index:100;display:none;align-items:flex-end;justify-content:center;
    background:rgba(6,9,15,.66);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
  .modal.open{display:flex}
  .sheet{width:100%;max-width:560px;background:var(--surface);border:1px solid var(--line-s);
    border-bottom:none;border-radius:18px 18px 0 0;padding:16px 16px calc(18px + env(safe-area-inset-bottom))}
  .sheet h3{font-family:var(--disp);font-weight:600;letter-spacing:.04em;margin:0 0 4px;font-size:16px}
  .sheet p{font-size:12px;color:var(--mut);margin:0 0 11px;line-height:1.5}
  .sheet textarea{width:100%;height:118px;resize:none;background:#0e1422;border:1.5px solid var(--line-s);
    border-radius:10px;color:var(--txt);font:12px/1.5 ui-monospace,Menlo,monospace;padding:10px;outline:none;word-break:break-all}
  .sheet textarea:focus{border-color:var(--line-2)}
  .sheet .acts{display:flex;gap:8px;margin-top:11px}
  .sheet .acts button{flex:1;font-family:var(--disp);font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    font-size:12.5px;border:none;border-radius:10px;padding:12px;cursor:pointer}
  .sheet .ghost{background:#ffffff10;color:var(--mut);border:1px solid var(--line-s)}
  .sheet .solid{background:linear-gradient(180deg,#fff,#dfe5f0);color:#0c1018}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(22px + env(safe-area-inset-bottom));
    background:#0c1018;border:1px solid var(--line-2);color:var(--txt);font-size:12.5px;padding:9px 15px;
    border-radius:20px;z-index:120;opacity:0;transition:.2s;pointer-events:none;max-width:90%;text-align:center}
  .toast.show{opacity:1}

  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  button:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid #6f86ff;outline-offset:2px}
  @media(max-width:360px){
    .score{font-size:46px} .row .who{flex-basis:44px;font-size:10px} .tname{font-size:13.5px}
  }
  /* desktop (mouse): show a thin scrollbar so the group / round bars are scrollable */
  @media (hover:hover) and (pointer:fine){
    .chips,.rounds{scrollbar-width:thin;scrollbar-color:#3a455d transparent}
    .chips::-webkit-scrollbar,.rounds::-webkit-scrollbar{display:block;height:8px}
    .chips::-webkit-scrollbar-thumb,.rounds::-webkit-scrollbar-thumb{background:#3a455d;border-radius:10px}
    .chips::-webkit-scrollbar-track,.rounds::-webkit-scrollbar-track{background:transparent}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><span class="dot"></span><h1>World Cup 2026 · Prediction Duel</h1><span class="dot t"></span></div>
    <div class="board">
      <div class="side s1">
        <div class="namewrap"><span class="pin p1"></span><input class="name" id="n1" maxlength="12" aria-label="Player 1 name"></div>
        <div class="score" id="sc1">0</div>
        <div class="breakdown" id="bd1">0 group · 0 ko</div>
      </div>
      <div class="vs">
        <span class="v">VS</span>
        <span class="lead tie" id="lead">level</span>
      </div>
      <div class="side s2">
        <div class="namewrap"><span class="pin p2"></span><input class="name" id="n2" maxlength="12" aria-label="Player 2 name"></div>
        <div class="score" id="sc2">0</div>
        <div class="breakdown" id="bd2">0 group · 0 ko</div>
      </div>
    </div>
    <div class="tabs" role="tablist">
      <button id="tab-group" role="tab" aria-selected="true">Group stage</button>
      <button id="tab-ko" role="tab" aria-selected="false">Knockout</button>
    </div>
  </header>

  <div id="syncbar" style="margin:10px 0 0"></div>

  <main id="view"><div class="skeleton"><div class="s">Loading your picks…</div></div></main>

  <div class="foot">
    <div class="tools primary">
      <button id="btnBackup">⬇︎&nbsp; Backup</button>
      <button id="btnRestore">⬆︎&nbsp; Restore</button>
    </div>
    <div class="tools">
      <button id="clrResults">Clear results</button>
      <button id="clrPicks">Clear picks</button>
    </div>
    <p class="note" id="footnote"></p>
  </div>
</div>

<div class="modal" id="modal">
  <div class="sheet">
    <h3 id="mTitle">Backup</h3>
    <p id="mDesc"></p>
    <textarea id="mArea" spellcheck="false" autocapitalize="off" autocomplete="off" autocorrect="off"></textarea>
    <div class="acts">
      <button class="ghost" id="mCancel">Close</button>
      <button class="solid" id="mAction">Copy</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

 F:{teams:["Netherlands","Japan","Sweden","Tunisia"],                   dates:["Jun 14","Jun 20","Jun 26"]},
 G:{teams:["Belgium","Egypt","Iran","New Zealand"],                     dates:["Jun 15","Jun 21","Jun 26"]},
 H:{teams:["Spain","Cape Verde","Saudi Arabia","Uruguay"],              dates:["Jun 15","Jun 21","Jun 26"]},
 I:{teams:["France","Senegal","Iraq","Norway"],                         dates:["Jun 16","Jun 22","Jun 26"]},
 J:{teams:["Argentina","Algeria","Austria","Jordan"],                   dates:["Jun 16","Jun 22","Jun 27"]},
 K:{teams:["Portugal","DR Congo","Uzbekistan","Colombia"],              dates:["Jun 17","Jun 23","Jun 27"]},
 L:{teams:["England","Croatia","Ghana","Panama"],                       dates:["Jun 17","Jun 23","Jun 27"]}
};
const MD=[[[0,1],[2,3]],[[0,3],[1,2]],[[0,2],[1,3]]];

const GROUP_MATCHES=[];
Object.keys(GROUPS).forEach(g=>{
  const G=GROUPS[g];
  MD.forEach((pairs,mi)=>{
    pairs.forEach(([a,b])=>{
      GROUP_MATCHES.push({ id:`${g}-${a}${b}`, group:g, md:mi+1, date:G.dates[mi], a:G.teams[a], b:G.teams[b] });
    });
  });
});

const MONTHS={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
function dateObj(s){ const [m,d]=s.split(" "); return new Date(2026,MONTHS[m],+d); }
function isPast(s){ const now=new Date(); now.setHours(0,0,0,0); return dateObj(s)<now; }
function isToday(s){ const n=new Date(); return dateObj(s).toDateString()===n.toDateString(); }
function flag(t,mini){
  const code=ISO[t];
  const cls=mini?"flagmini":"flagimg";
  if(!code) return `<span class="${cls} noflag">⚑</span>`;
  const a=mini?"20":"40", b=mini?"40":"80";
  return `<img class="${cls}" src="https://flagcdn.com/w${a}/${code}.png" srcset="https://flagcdn.com/w${b}/${code}.png 2x" alt="" loading="lazy">`;
}
function shortName(t){ return t.replace("Bosnia & Herzegovina","Bosnia"); }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
const $=id=>document.getElementById(id);

/* ─────────────── Storage: Firebase Realtime Database (shared) + localStorage fallback ─────────────── */
const KEY="wc2026_duel_v1";
const db = window.__db || null;
function load(){ try{ const v=localStorage.getItem(KEY); return v?JSON.parse(v):null; }catch(e){ return null; } }
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(state)); }catch(e){} }
function applyData(d){
  if(!d||typeof d!=="object") return;
  state.p1=d.p1||state.p1; state.p2=d.p2||state.p2;
  state.picks=(d.picks&&typeof d.picks==="object")?d.picks:{};
  state.results=(d.results&&typeof d.results==="object")?d.results:{};
  state.ko=Array.isArray(d.ko)?d.ko:[];
}
function nameFocused(){ const a=document.activeElement; return !!(a && a.classList && a.classList.contains("name")); }
function canon(o){ return JSON.stringify({p1:o.p1,p2:o.p2,picks:o.picks||{},results:o.results||{},ko:o.ko||[]}); }

let remoteReady=false, suppressEcho=false;
function pushRemote(){
  if(!db) return;
  suppressEcho=true;
  db.set({p1:state.p1,p2:state.p2,picks:state.picks,results:state.results,ko:state.ko})
    .catch(e=>console.error("Firebase write failed:",e))
    .finally(()=>{ setTimeout(()=>{ suppressEcho=false; }, 250); });
}
function listenRemote(){
  if(!db) return;
  db.on("value", snap=>{
    const d=snap.val();
    remoteReady=true;
    renderConn(true);
    if(suppressEcho) return;
    if(!d) return;
    if(nameFocused()) return;
    if(canon(d)===canon(state)) return;
    applyData(d); save(); renderActive(); renderHeader();
  }, err=>{ console.error("Firebase read failed:", err); renderConn(false); });
  setTimeout(()=>{ if(!remoteReady) renderConn(false); }, 4000);
}

/* ─────────────── State ─────────────── */
let state={ p1:"Jerry", p2:"Kalipok", picks:{}, results:{}, ko:[] };
let tab="group", curGroup="A", koRound="R16";

function commit(mutator, skipRender){
  mutator(state); save();
  if(!skipRender){ renderActive(); renderHeader(); }
  pushRemote();
}

/* ─────────────── Scoring ─────────────── */
function scores(){
  let s={p1g:0,p1k:0,p2g:0,p2k:0};
  GROUP_MATCHES.forEach(m=>{ const r=state.results[m.id]; if(!r)return;
    const p=state.picks[m.id]||{}; if(p.p1===r)s.p1g++; if(p.p2===r)s.p2g++; });
  state.ko.forEach(m=>{ const r=state.results[m.id]; if(!r)return;
    const p=state.picks[m.id]||{}; if(p.p1===r)s.p1k++; if(p.p2===r)s.p2k++; });
  s.p1=s.p1g+s.p1k; s.p2=s.p2g+s.p2k; return s;
}

/* ─────────────── Render: header ─────────────── */
function renderHeader(){
  const s=scores();
  if(!nameFocused()){ $("n1").value=state.p1; $("n2").value=state.p2; }
  $("sc1").textContent=s.p1; $("sc2").textContent=s.p2;
  $("bd1").textContent=`${s.p1g} group · ${s.p1k} ko`;
  $("bd2").textContent=`${s.p2g} group · ${s.p2k} ko`;
  const lead=$("lead");
  if(s.p1===s.p2){ lead.className="lead tie"; lead.textContent=(s.p1===0?"level":"all square"); }
  else if(s.p1>s.p2){ lead.className="lead l1"; lead.textContent=`${state.p1} +${s.p1-s.p2}`; }
  else { lead.className="lead l2"; lead.textContent=`${state.p2} +${s.p2-s.p1}`; }
}

/* ─────────────── Render: group match card (1 / X / 2) ─────────────── */
function groupCard(m){
  const res=state.results[m.id]||null;
  const pk=state.picks[m.id]||{};
  const done=!!res;
  const status = res ? '<span class="status ft">Full time</span>'
                : isToday(m.date) ? '<span class="status up">Today</span>'
                : isPast(m.date) ? '<span class="status">Awaiting result</span>'
                : `<span class="status up">${m.date}</span>`;
  const winA=res==="H", winB=res==="A";
  function seg(role){
    const sel = role==="res" ? res : pk[role==="p1"?"p1":"p2"];
    return ["H","D","A"].map(opt=>{
      const on=sel===opt; let cls=""; if(on)cls=" sel";
      if(on && role!=="res" && res){ cls+=(opt===res)?" correct":" wrong"; }
      const tick=(on && role!=="res" && res)?(opt===res?'<span class="tick">✓</span>':'<span class="tick">✕</span>'):"";
      const label=opt==="H"?"1":opt==="D"?"X":"2";
      return `<button class="${cls.trim()}" data-m="${m.id}" data-role="${role}" data-opt="${opt}">${label}${tick}</button>`;
    }).join("");
  }
  return `<div class="card ${done?'done':''}">
    <div class="ctop">
      <div class="team home ${res?(winA?'win':'lose'):''}"><span class="flag">${flag(m.a)}</span><span class="tname">${shortName(m.a)}</span></div>
      <div class="cmid">${status}<span class="vbadge">v</span></div>
      <div class="team away ${res?(winB?'win':'lose'):''}"><span class="flag">${flag(m.b)}</span><span class="tname">${shortName(m.b)}</span></div>
    </div>
    <div class="row result"><span class="who">Result</span><div class="seg">${seg("res")}</div></div>
    <div class="row p1"><span class="who"><span class="pin p1"></span>${esc(state.p1)}</span><div class="seg">${seg("p1")}</div></div>
    <div class="row p2"><span class="who"><span class="pin p2"></span>${esc(state.p2)}</span><div class="seg">${seg("p2")}</div></div>
  </div>`;
}

/* ─────────────── Render: knockout card (2-way) ─────────────── */
function koCard(m){
  const res=state.results[m.id]||null;
  const pk=state.picks[m.id]||{};
  const done=!!res;
  function seg(role){
    const sel = role==="res" ? res : pk[role==="p1"?"p1":"p2"];
    return ["H","A"].map(opt=>{
      const on=sel===opt; let cls=""; if(on)cls=" sel";
      if(on && role!=="res" && res){ cls+=(opt===res)?" correct":" wrong"; }
      const tick=(on && role!=="res" && res)?(opt===res?' <span class="tick">✓</span>':' <span class="tick">✕</span>'):"";
      const label=opt==="H"?shortName(m.a):shortName(m.b);
      return `<button class="${cls.trim()}" data-m="${m.id}" data-role="${role}" data-opt="${opt}">${esc(label)}${tick}</button>`;
    }).join("");
  }
  const status=res?'<span class="status ft">Decided</span>':'<span class="status up">Who advances?</span>';
  return `<div class="card ${done?'done':''}">
    <button class="del" data-del="${m.id}" aria-label="Remove match">✕</button>
    <div class="ctop">
      <div class="team home ${res?(res==='H'?'win':'lose'):''}"><span class="flag">${flag(m.a)}</span><span class="tname">${shortName(m.a)}</span></div>
      <div class="cmid">${status}<span class="vbadge">v</span></div>
      <div class="team away ${res?(res==='A'?'win':'lose'):''}"><span class="flag">${flag(m.b)}</span><span class="tname">${shortName(m.b)}</span></div>
    </div>
    <div class="row result"><span class="who">Winner</span><div class="seg">${seg("res")}</div></div>
    <div class="row p1"><span class="who"><span class="pin p1"></span>${esc(state.p1)}</span><div class="seg">${seg("p1")}</div></div>
    <div class="row p2"><span class="who"><span class="pin p2"></span>${esc(state.p2)}</span><div class="seg">${seg("p2")}</div></div>
  </div>`;
}

/* ─────────────── Render: views ─────────────── */
function renderGroup(){
  const v=$("view");
  const _sx=(v.querySelector(".chips")||{}).scrollLeft||0;
  const chips=Object.keys(GROUPS).map(g=>{
    const teams=GROUPS[g].teams.map(t=>flag(t,true)).join("");
    return `<button class="chip" data-g="${g}" aria-selected="${g===curGroup}">Group ${g}<small>${teams}</small></button>`;
  }).join("");
  const ms=GROUP_MATCHES.filter(m=>m.group===curGroup);
  let body="";
  [1,2,3].forEach(md=>{
    const list=ms.filter(m=>m.md===md); if(!list.length)return;
    body+=`<div class="md"><span class="lab">Matchday ${md}</span><span class="dt">${list[0].date}</span><span class="ln"></span></div>`;
    body+=list.map(groupCard).join("");
  });
  v.innerHTML=`
    <div class="legend">
      <span><span class="key">1</span> left team wins</span>
      <span><span class="key">X</span> draw</span>
      <span><span class="key">2</span> right team wins</span>
    </div>
    <p class="hint"><span>👉</span><span>Each of you taps <b>1 / X / 2</b>. Set <b>Result</b> as games finish — scores update on their own. 1&nbsp;point per correct call.</span></p>
    <div class="chips">${chips}</div>
    ${body}`;
  const _c=v.querySelector(".chips"); if(_c) _c.scrollLeft=_sx;
}

const ROUNDS=[["R32","Round of 32"],["R16","Round of 16"],["QF","Quarter-final"],["SF","Semi-final"],["3P","Third place"],["F","Final"]];
function renderKO(){
  const v=$("view");
  const _sx=(v.querySelector(".rounds")||{}).scrollLeft||0;
  const rbtns=ROUNDS.map(([k,l])=>`<button class="rbtn" data-r="${k}" aria-selected="${k===koRound}">${l}</button>`).join("");
  const a=esc((document.getElementById("ta")?document.getElementById("ta").value:""));
  let list="";
  if(!state.ko.length){
    list=`<div class="empty"><span class="big">No knockout ties yet</span>The bracket is set once the groups wrap up (from Jun 28). Add each tie above as it's confirmed, then both of you call the winner.</div>`;
  }else{
    ROUNDS.forEach(([k,l])=>{
      const games=state.ko.filter(m=>m.round===k); if(!games.length)return;
      list+=`<div class="kohead">${l}</div>`+games.map(koCard).join("");
    });
  }
  v.innerHTML=`
    <p class="hint"><span>🏆</span><span>No draws here — pick <b>who goes through</b> (extra time / pens count). Add a tie, type both teams, then tap your pick. 1&nbsp;point per correct winner.</span></p>
    <div class="adder">
      <div class="lab">Add a knockout tie</div>
      <div class="rounds">${rbtns}</div>
      <div class="teamins">
        <input id="ta" placeholder="Team" autocomplete="off" value="${a}">
        <span class="x">v</span>
        <input id="tb" placeholder="Team" autocomplete="off">
      </div>
      <button class="addbtn" id="addKo" disabled>Add tie</button>
    </div>
    ${list}`;
  const _r=v.querySelector(".rounds"); if(_r) _r.scrollLeft=_sx;
  syncAddBtn();
}
function syncAddBtn(){
  const ta=$("ta"),tb=$("tb"),btn=$("addKo"); if(!btn)return;
  btn.disabled=!(ta.value.trim() && tb.value.trim());
}

function renderActive(){ if(tab==="group") renderGroup(); else renderKO(); }
function render(){
  $("tab-group").setAttribute("aria-selected", tab==="group");
  $("tab-ko").setAttribute("aria-selected", tab==="ko");
  renderHeader(); renderActive();
}
function renderInfoBar(){ renderConn(null); }
function renderConn(ok){
  const el=$("syncbar");
  if(!db){
    el.innerHTML=`<div class="syncbar info"><span class="i">💾</span><span>No shared database configured — saved on this device only.</span></div>`;
    return;
  }
  if(ok===true){
    el.innerHTML=`<div class="syncbar info" style="border-color:#2f6b44;background:#15291c;color:#bfe8cd"><span class="i">🟢</span><span>Live — you and ${esc(state.p2)} share one board.</span></div>`;
  }else if(ok===false){
    el.innerHTML=`<div class="syncbar info" style="border-color:#5a4424;background:#241a0f;color:#e9d2a6"><span class="i">⚠️</span><span>Can't reach the shared database right now — picks save locally and will sync once it reconnects.</span></div>`;
  }else{
    el.innerHTML=`<div class="syncbar info"><span class="i">💾</span><span>Connecting to shared board…</span></div>`;
  }
}

/* ─────────────── Backup / Restore ─────────────── */
function encode(obj){
  try{ return btoa(unescape(encodeURIComponent(JSON.stringify({p1:obj.p1,p2:obj.p2,picks:obj.picks||{},results:obj.results||{},ko:obj.ko||[]})))); }
  catch(e){ return ""; }
}
function decode(str){ return JSON.parse(decodeURIComponent(escape(atob(str.trim())))); }

let toastT;
function toast(msg){ const el=$("toast"); el.textContent=msg; el.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove("show"),2300); }

function copyText(t){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(()=>toast("Copied — paste it somewhere safe")).catch(selectArea);
  } else selectArea();
}
function selectArea(){
  const a=$("mArea"); a.focus(); a.select();
  try{ document.execCommand("copy"); toast("Copied — paste it somewhere safe"); }
  catch(e){ toast("Tap and hold the code, then Copy"); }
}
function openModal(mode){
  if(mode==="backup"){
    $("mTitle").textContent="Backup your game";
    $("mDesc").textContent="Copy this code and paste it somewhere safe — your Notes app or Telegram saved messages. Paste it into Restore on any device to bring everything back.";
    $("mArea").value=encode(state); $("mArea").readOnly=true;
    $("mAction").textContent="Copy"; $("mAction").onclick=()=>copyText($("mArea").value);
  }else{
    $("mTitle").textContent="Restore from backup";
    $("mDesc").textContent="Paste a backup code below and tap Restore. This replaces everything currently saved on this device.";
    $("mArea").value=""; $("mArea").readOnly=false;
    $("mAction").textContent="Restore"; $("mAction").onclick=doRestore;
    setTimeout(()=>$("mArea").focus(),50);
  }
  $("modal").classList.add("open");
}
function closeModal(){ $("modal").classList.remove("open"); }
function doRestore(){
  const raw=$("mArea").value.trim();
  if(!raw){ toast("Paste a code first"); return; }
  let d; try{ d=decode(raw); }catch(e){ toast("That code isn't valid"); return; }
  if(!d||typeof d!=="object"||(!d.picks&&!d.results&&!d.ko)){ toast("That code isn't valid"); return; }
  if(!confirm("Restore this backup? It replaces everything currently saved.")) return;
  applyData(d); save(); closeModal(); render(); toast("Restored ✓");
}

/* ─────────────── Events ─────────────── */
document.body.addEventListener("click",e=>{
  const t=e.target.closest("button"); if(!t)return;
  if(t.id==="tab-group"){ tab="group"; render(); return; }
  if(t.id==="tab-ko"){ tab="ko"; render(); return; }
  if(t.dataset.g){ curGroup=t.dataset.g; renderGroup(); return; }
  if(t.dataset.r){ koRound=t.dataset.r; renderKO(); return; }
  if(t.id==="btnBackup"){ openModal("backup"); return; }
  if(t.id==="btnRestore"){ openModal("restore"); return; }
  if(t.id==="mCancel"){ closeModal(); return; }
  if(t.id==="addKo"){
    const a=$("ta").value.trim(), b=$("tb").value.trim(); if(!a||!b)return;
    const item={id:"ko_"+Date.now().toString(36)+Math.random().toString(36).slice(2,5), round:koRound, a, b};
    commit(s=>{ s.ko=Array.isArray(s.ko)?s.ko:[]; s.ko.push(item); });
    if($("ta")) $("ta").value=""; if($("tb")) $("tb").value=""; syncAddBtn();
    return;
  }
  if(t.dataset.del){
    const did=t.dataset.del;
    commit(s=>{ if(Array.isArray(s.ko)) s.ko=s.ko.filter(m=>m.id!==did); if(s.picks) delete s.picks[did]; if(s.results) delete s.results[did]; });
    return;
  }
  if(t.dataset.m){
    const id=t.dataset.m, role=t.dataset.role, opt=t.dataset.opt;
    let target;
    if(role==="res"){ target=(state.results[id]===opt)?null:opt; }
    else { const key=role==="p1"?"p1":"p2"; target=((state.picks[id]||{})[key]===opt)?null:opt; }
    commit(s=>{
      if(role==="res"){ s.results=s.results||{}; if(target===null) delete s.results[id]; else s.results[id]=target; }
      else { const key=role==="p1"?"p1":"p2"; s.picks=s.picks||{}; s.picks[id]=s.picks[id]||{};
             if(target===null) delete s.picks[id][key]; else s.picks[id][key]=target; }
    });
    return;
  }
});
$("modal").addEventListener("click",e=>{ if(e.target.id==="modal") closeModal(); });

/* desktop (mouse wheel): scroll the group / round bars horizontally */
document.addEventListener("wheel",function(e){
  const bar=e.target.closest&&e.target.closest(".chips,.rounds");
  if(!bar) return;
  if(bar.scrollWidth<=bar.clientWidth) return;
  if(Math.abs(e.deltaY)<=Math.abs(e.deltaX)) return;
  bar.scrollLeft+=e.deltaY;
  e.preventDefault();
},{passive:false});

document.body.addEventListener("input",e=>{
  if(e.target.id==="ta"||e.target.id==="tb"){ syncAddBtn(); return; }
  if(e.target.id==="n1"){ const v=e.target.value||"P1"; commit(s=>{ s.p1=v; }, true); }
  if(e.target.id==="n2"){ const v=e.target.value||"P2"; commit(s=>{ s.p2=v; }, true); }
});
document.body.addEventListener("change",e=>{
  if(e.target.id==="n1"){ const v=e.target.value.trim()||"P1"; commit(s=>{ s.p1=v; }); }
  if(e.target.id==="n2"){ const v=e.target.value.trim()||"P2"; commit(s=>{ s.p2=v; }); }
});

$("clrResults").addEventListener("click",()=>{
  if(confirm("Clear every result? Your picks stay; only the actual outcomes are wiped.")) commit(s=>{ s.results={}; });
});
$("clrPicks").addEventListener("click",()=>{
  if(confirm("Clear ALL picks for both of you? Results stay. This can't be undone.")) commit(s=>{ s.picks={}; });
});

$("footnote").textContent="Saved on this device. On a hosted https:// page (GitHub Pages) it persists; on iPhone, Add to Home Screen so Safari doesn't auto-clear it. Tap Backup now and then to keep a copy. 72 group matches pre-loaded; add knockout ties once the draw is set.";

/* ─────────────── Boot ─────────────── */
(function(){
  applyData(load());
  renderInfoBar();
  render();
  listenRemote();
})();
})();
</script>
</body>
